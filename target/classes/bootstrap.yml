spring:
  application:
    name: planManagement
  cloud:
    nacos:
      discovery:
        port: ${PLAN_MANAGEMENT_SERVICE_PORT_WEB:8080}
        ip: ${PLAN_MANAGEMENT_SERVICE_HOST:127.0.0.1}
        server-addr: ${NACOS_ADDR:127.0.0.1:28848}
        enabled: true # 正式部署需要改为true
        namespace: ${SERVICE_NAMESPACE:develop-env}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:28848}
        file-extension: yaml
        enabled: true # 正式部署需要改为true
        namespace: ${SERVICE_NAMESPACE:develop-env}
server:
  port: 8080