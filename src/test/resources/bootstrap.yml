spring:
  application:
    name: planManagement
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:28848}
        enabled: false # 正式部署需要改为true
        namespace: ${SERVICE_NAMESPACE:public}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:28848}
        file-extension: yaml
        enabled: false # 正式部署需要改为true
        namespace: ${SERVICE_NAMESPACE:public}
server:
  port: 8080